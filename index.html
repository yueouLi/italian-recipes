<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Cucina Italiana</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap');

    :root {
      --terracotta: #C4552A;
      --terracotta-light: #E8856A;
      --olive: #6B7C47;
      --olive-light: #8FA05A;
      --cream: #FAF7F2;
      --warm-white: #FFFFF8;
      --text-dark: #2C2416;
      --text-mid: #5A4E3C;
      --text-light: #8C7B69;
      --border: #E8DDD0;
      --shadow: rgba(44, 36, 22, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, #2C2416 0%, #4A3520 40%, #6B4C2A 100%);
      padding: 60px 40px 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .hero-subtitle {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: var(--terracotta-light);
      text-transform: uppercase;
      margin-bottom: 16px;
      position: relative;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      color: #FAF7F2;
      line-height: 1.1;
      position: relative;
    }
    .hero h1 em {
      font-style: italic;
      color: var(--terracotta-light);
    }
    .hero-desc {
      margin-top: 20px;
      font-size: 1rem;
      color: rgba(250, 247, 242, 0.65);
      font-weight: 300;
      position: relative;
    }

    /* ── SEARCH & FILTER BAR ── */
    .controls {
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px var(--shadow);
    }
    .search-wrap {
      flex: 1;
      min-width: 240px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 11px 16px 11px 44px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--terracotta); }
    .search-input::placeholder { color: var(--text-light); }

    .filter-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 16px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: transparent;
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: var(--text-mid);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
    .filter-btn.active {
      background: var(--terracotta);
      border-color: var(--terracotta);
      color: white;
    }

    .results-count {
      font-size: 0.8rem;
      color: var(--text-light);
      white-space: nowrap;
      margin-left: auto;
    }

    /* ── MAIN GRID ── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
    }

    /* ── RECIPE CARD ── */
    .card {
      background: var(--warm-white);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px var(--shadow);
    }
    .card-img {
      height: 180px;
      background: linear-gradient(135deg, #E8DDD0 0%, #D4C5B0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      position: relative;
    }
    .card-category {
      position: absolute;
      top: 14px;
      left: 14px;
      background: rgba(44, 36, 22, 0.75);
      color: white;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 12px;
      backdrop-filter: blur(4px);
    }
    .card-diff {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
    }
    .diff-Einfach { background: #E6F4EA; color: #2E7D32; }
    .diff-Mittel  { background: #FFF8E1; color: #F57F17; }
    .diff-Schwer  { background: #FDECEA; color: #C62828; }

    .card-body { padding: 20px; }
    .card-italian {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.8rem;
      color: var(--terracotta);
      margin-bottom: 6px;
    }
    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1.3;
      margin-bottom: 12px;
    }
    .card-meta {
      display: flex;
      gap: 16px;
      font-size: 0.78rem;
      color: var(--text-light);
    }
    .card-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card-ingredients-preview {
      margin-top: 14px;
      font-size: 0.78rem;
      color: var(--text-mid);
      line-height: 1.6;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
    }
    .empty-icon { font-size: 4rem; margin-bottom: 16px; }
    .empty h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 8px; }
    .empty p { color: var(--text-light); font-size: 0.9rem; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44, 36, 22, 0.6);
      z-index: 200;
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--warm-white);
      border-radius: 20px;
      max-width: 680px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal-close {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: flex-end;
      padding: 16px 20px 0;
      background: var(--warm-white);
      z-index: 1;
    }
    .modal-close button {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: white;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--text-mid);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .modal-close button:hover { background: var(--cream); }

    .modal-content { padding: 8px 32px 40px; }
    .modal-header { margin-bottom: 24px; }
    .modal-italian {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--terracotta);
      font-size: 0.95rem;
      margin-bottom: 6px;
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .modal-badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge {
      padding: 5px 12px;
      border-radius: 14px;
      font-size: 0.78rem;
      font-weight: 500;
      background: var(--cream);
      color: var(--text-mid);
      border: 1px solid var(--border);
    }
    .badge-cat { background: #FFF3ED; color: var(--terracotta); border-color: #FDDBC8; }

    .modal-section { margin-top: 28px; }
    .modal-section h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .modal-section h3::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .ingredients-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      list-style: none;
    }
    .ingredients-list li {
      font-size: 0.88rem;
      color: var(--text-mid);
      padding: 7px 12px;
      background: var(--cream);
      border-radius: 8px;
      border-left: 3px solid var(--terracotta-light);
      line-height: 1.4;
    }

    .steps-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .steps-list li {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .step-num {
      min-width: 28px; height: 28px;
      background: var(--terracotta);
      color: white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .steps-list li p {
      font-size: 0.9rem;
      color: var(--text-mid);
      line-height: 1.65;
      padding-top: 4px;
    }

    .tips-box {
      background: #FFF8E6;
      border: 1px solid #FFE4A0;
      border-radius: 12px;
      padding: 16px 18px;
      font-size: 0.88rem;
      color: #6B5A1E;
      line-height: 1.6;
    }

    .modal-print {
      margin-top: 28px;
      display: flex;
      justify-content: center;
    }
    .btn-print {
      padding: 10px 24px;
      background: var(--terracotta);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .btn-print:hover { background: #A83E1E; }

    /* ── PRINT ── */
    @media print {
      .hero, .controls, .grid { display: none !important; }
      .modal-overlay { display: block !important; position: static; background: none; }
      .modal { box-shadow: none; max-height: none; overflow: visible; }
      .modal-close, .modal-print { display: none; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .hero { padding: 40px 20px 60px; }
      .controls { padding: 14px 16px; }
      .main { padding: 24px 16px 60px; }
      .grid { grid-template-columns: 1fr; gap: 18px; }
      .ingredients-list { grid-template-columns: 1fr; }
      .modal-content { padding: 8px 20px 32px; }
      .modal-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <p class="hero-subtitle">Ricettario</p>
  <h1>La <em>Cucina</em><br>Italiana</h1>
  <p class="hero-desc">Die echte italienische Küche · 265 Seiten · handverlesen</p>
</header>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" class="search-input" id="searchInput" placeholder="Rezept oder Zutat suchen…">
  </div>
  <div class="filter-group" id="categoryFilters"></div>
  <span class="results-count" id="resultsCount"></span>
</div>

<!-- GRID -->
<main class="main">
  <div class="grid" id="recipeGrid"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-close"><button id="modalClose">✕</button></div>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
// Recipes werden aus recipes.json geladen (oder hier direkt eingebettet)
let RECIPES = [];

// Category emojis
const CAT_EMOJI = {
  'Antipasti': '🫒', 'Pasta': '🍝', 'Risotto': '🍚',
  'Suppe': '🍲', 'Fisch': '🐟', 'Fleisch': '🥩',
  'Gemüse': '🥦', 'Dessert': '🍮', 'Sonstiges': '🍴'
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeCategory = 'Alle';
let searchQuery = '';

// ── RENDER ────────────────────────────────────────────────────────────────────
function getFilteredRecipes() {
  return RECIPES.filter(r => {
    const matchCat = activeCategory === 'Alle' || r.category === activeCategory;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q ||
      r.name?.toLowerCase().includes(q) ||
      r.name_italian?.toLowerCase().includes(q) ||
      r.ingredients?.some(i => i.toLowerCase().includes(q));
    return matchCat && matchSearch;
  });
}

function renderFilters() {
  const cats = ['Alle', ...new Set(RECIPES.map(r => r.category).filter(Boolean).sort())];
  const wrap = document.getElementById('categoryFilters');
  wrap.innerHTML = cats.map(cat =>
    `<button class="filter-btn ${cat === activeCategory ? 'active' : ''}" data-cat="${cat}">${CAT_EMOJI[cat] || ''} ${cat}</button>`
  ).join('');
}

function formatTime(min) {
  if (!min) return null;
  if (min < 60) return min + ' Min';
  const h = Math.floor(min / 60), m = min % 60;
  return m ? `${h}h ${m}m` : `${h}h`;
}

function renderGrid() {
  const recipes = getFilteredRecipes();
  const grid = document.getElementById('recipeGrid');
  document.getElementById('resultsCount').textContent = `${recipes.length} Rezept${recipes.length !== 1 ? 'e' : ''}`;

  if (recipes.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <h3>Keine Rezepte gefunden</h3>
        <p>Versuch einen anderen Suchbegriff oder Filter.</p>
      </div>`;
    return;
  }

  grid.innerHTML = recipes.map((r, i) => {
    const totalTime = (r.prep_time || 0) + (r.cook_time || 0);
    const timeStr = formatTime(totalTime);
    const ing3 = r.ingredients?.slice(0, 3).join(', ');
    const more = r.ingredients?.length > 3 ? ` +${r.ingredients.length - 3}` : '';
    return `
      <div class="card" data-idx="${RECIPES.indexOf(r)}">
        <div class="card-img">
          <span>${CAT_EMOJI[r.category] || '🍴'}</span>
          <span class="card-category">${r.category || 'Sonstiges'}</span>
          ${r.difficulty ? `<span class="card-diff diff-${r.difficulty}">${r.difficulty}</span>` : ''}
        </div>
        <div class="card-body">
          ${r.name_italian ? `<p class="card-italian">${r.name_italian}</p>` : ''}
          <h2 class="card-name">${r.name}</h2>
          <div class="card-meta">
            ${r.servings ? `<span>👥 ${r.servings}</span>` : ''}
            ${timeStr ? `<span>⏱ ${timeStr}</span>` : ''}
            ${r.ingredients?.length ? `<span>🧂 ${r.ingredients.length} Zutaten</span>` : ''}
          </div>
          ${ing3 ? `<p class="card-ingredients-preview">${ing3}${more}</p>` : ''}
        </div>
      </div>`;
  }).join('');
}

function openModal(recipe) {
  const totalTime = (recipe.prep_time || 0) + (recipe.cook_time || 0);
  const html = `
    <div class="modal-header">
      ${recipe.name_italian ? `<p class="modal-italian">${recipe.name_italian}</p>` : ''}
      <h2 class="modal-title">${recipe.name}</h2>
      <div class="modal-badges">
        ${recipe.category ? `<span class="badge badge-cat">${CAT_EMOJI[recipe.category] || ''} ${recipe.category}</span>` : ''}
        ${recipe.difficulty ? `<span class="badge diff-${recipe.difficulty}">${recipe.difficulty}</span>` : ''}
        ${recipe.servings ? `<span class="badge">👥 ${recipe.servings}</span>` : ''}
        ${recipe.prep_time ? `<span class="badge">⚡ Vorbereitung: ${formatTime(recipe.prep_time)}</span>` : ''}
        ${recipe.cook_time ? `<span class="badge">🔥 Kochen: ${formatTime(recipe.cook_time)}</span>` : ''}
        ${totalTime > 0 ? `<span class="badge">⏱ Gesamt: ${formatTime(totalTime)}</span>` : ''}
      </div>
    </div>

    ${recipe.ingredients?.length ? `
    <div class="modal-section">
      <h3>Zutaten</h3>
      <ul class="ingredients-list">
        ${recipe.ingredients.map(i => `<li>${i}</li>`).join('')}
      </ul>
    </div>` : ''}

    ${recipe.steps?.length ? `
    <div class="modal-section">
      <h3>Zubereitung</h3>
      <ol class="steps-list">
        ${recipe.steps.map((s, i) => `<li><span class="step-num">${i+1}</span><p>${s}</p></li>`).join('')}
      </ol>
    </div>` : ''}

    ${recipe.tips ? `
    <div class="modal-section">
      <h3>Tipp</h3>
      <div class="tips-box">💡 ${recipe.tips}</div>
    </div>` : ''}

    <div class="modal-print">
      <button class="btn-print" onclick="window.print()">🖨 Rezept drucken</button>
    </div>
  `;
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderGrid();
});

document.getElementById('categoryFilters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeCategory = btn.dataset.cat;
  renderFilters();
  renderGrid();
});

document.getElementById('recipeGrid').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  openModal(RECIPES[parseInt(card.dataset.idx)]);
});

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadRecipes() {
  try {
    const res = await fetch('recipes.json');
    const all = await res.json();
    // Filter: nur Rezepte mit echten Zutaten
    RECIPES = all.filter(r => r.ingredients && r.ingredients.length > 0);
  } catch {
    // Fallback: direkt eingebettete Demo-Daten
    RECIPES = DEMO_RECIPES;
  }
  renderFilters();
  renderGrid();
}

// Demo-Daten als Fallback (werden überschrieben sobald recipes.json existiert)
const DEMO_RECIPES = [
  {
    name: "Kalbfleisch mit Thunfischsauce",
    name_italian: "Vitello tonnato",
    category: "Fleisch",
    servings: "6 Personen",
    prep_time: 30,
    cook_time: 90,
    difficulty: "Schwer",
    ingredients: ["800g Kalbskeule","1 Dose Thunfisch","4 Sardellenfilets","3 EL Kapern","2 Eigelb","150ml Olivenöl","Zitronensaft","Salz, Pfeffer","1 Zwiebel","1 Karotte","1 Stange Sellerie","Lorbeerblatt","Weißwein","Brühe"],
    steps: [
      "Kalbskeule mit Gemüse und Weißwein in Brühe ca. 90 Min. gar kochen, abkühlen lassen.",
      "Thunfisch mit Sardellen, Kapern, Eigelb und Zitronensaft pürieren.",
      "Olivenöl tropfenweise einarbeiten bis cremige Sauce entsteht.",
      "Kalbfleisch dünn aufschneiden, mit Sauce bedecken und 2h kalt stellen."
    ],
    tips: "Ein Tag vorher zubereiten – die Sauce zieht besser ein.",
    page: 99
  }
];

loadRecipes();
</script>
</body>
</html>
